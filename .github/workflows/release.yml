name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - run: cargo fmt -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features --locked
      - run: sudo apt-get update && sudo apt-get install --yes shellcheck
      - run: shellcheck install.sh

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install --yes musl-tools
      - name: Build
        run: cargo build --locked --release --target "${{ matrix.target }}"
      - name: Package
        run: |
          tar -C "target/${{ matrix.target }}/release" -czf "cudaenv-${{ matrix.target }}.tar.gz" cudaenv
          sha256sum "cudaenv-${{ matrix.target }}.tar.gz" > "cudaenv-${{ matrix.target }}.tar.gz.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: cudaenv-${{ matrix.target }}
          path: |
            cudaenv-${{ matrix.target }}.tar.gz
            cudaenv-${{ matrix.target }}.tar.gz.sha256

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/* --repo "${{ github.repository }}" --generate-notes
